  function markSectionError(sectionId) {
    const el = document.querySelector(`#${sectionId} .hab-loading`);
    if (el) el.outerHTML = '<div class="hab-error">Query failed</div>';
  }

  function renderHabSection(sectionId, data, barColor, totalParcelAcres) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    const title = HAB_SECTION_TITLES[sectionId] || '';

    const sorted = Array.from(data.entries())
      .sort((a, b) => b[1] - a[1])
      .slice(0, 25);
    const mappedAcres = sorted.reduce((s, [, ac]) => s + ac, 0);

    let rows = '';
    if (sorted.length === 0) {
      rows = '<div class="hab-empty">No features found in this area</div>';
    } else {
      for (const [label, ac] of sorted) {
        const pct = mappedAcres > 0 ? (ac / mappedAcres * 100) : 0;
        const escaped = label.replace(/"/g, '&quot;').replace(/</g, '&lt;');
        rows += `<div class="hab-row">
          <div class="hab-row-head">
            <span class="hab-label" title="${escaped}">${escaped}</span>
            <span class="hab-stats">${ac.toFixed(1)} ac · ${pct.toFixed(0)}%</span>
          </div>
          <div class="hab-bar-wrap">
            <div class="hab-bar" style="width:${pct.toFixed(1)}%;background:${barColor}"></div>
          </div>
        </div>`;
      }
      rows += `<div class="hab-total">${mappedAcres.toFixed(1)} of ${totalParcelAcres.toFixed(1)} ac mapped</div>`;
    }
    section.innerHTML = `<div class="hab-section-head">${title}</div>` + rows;
  }

  // Build ArcGIS REST query params for an intersects-by-bbox request.
  // inSR=4326 is required — without it, servers in local projections (Michigan GeoRef,
  // State Plane, etc.) interpret the WGS84 bbox coordinates as native units and return 0 features.
  function arcgisBboxParams(geom, outFields) {
    const bbox = turf.bbox({ type: 'Feature', geometry: geom, properties: {} });
    return new URLSearchParams({
      where:          '1=1',
      geometry: JSON.stringify({
        xmin: bbox[0], ymin: bbox[1], xmax: bbox[2], ymax: bbox[3],
        spatialReference: { wkid: 4326 }
      }),
      geometryType:   'esriGeometryEnvelope',
      spatialRel:     'esriSpatialRelIntersects',
      inSR:           '4326',
      outFields:      outFields,
      returnGeometry: 'true',
      outSR:          '4326',
      f:              'geojson'
    });
  }

  // Clip fetched features to the parcel geometry; return Map of label → acres
  function intersectToAcres(features, geom, nameGetter) {
    const gf = { type: 'Feature', geometry: geom, properties: {} };
    const result = new Map();
    for (const f of features) {
      if (!f.geometry) continue;
      try {
        const clipped = turf.intersect(f, gf);
        if (!clipped) continue;
        const ac = turf.area(clipped) * 0.000247105;
        if (ac < 0.001) continue;
        const label = nameGetter(f.properties) || 'Unknown';
        result.set(label, (result.get(label) || 0) + ac);
      } catch(e) { /* skip invalid geometry */ }
    }
    return result;
  }

  async function queryVeg(geom) {
    const resp = await fetch(`${VEG_URL}/query?${arcgisBboxParams(geom, 'COVERTYPE')}`);
    if (!resp.ok) throw new Error(`VEG HTTP ${resp.status}`);
    const fc = await resp.json();
    if (!fc.features?.length) return new Map();
    return intersectToAcres(fc.features, geom, p => p.COVERTYPE);
  }

  async function querySoils(geom) {
    const resp = await fetch(`${COUNTY_MS}/32/query?${arcgisBboxParams(geom, '*')}`);
    if (!resp.ok) throw new Error(`Soils HTTP ${resp.status}`);
    const fc = await resp.json();
    if (!fc.features?.length) return new Map();
    const nameFields = ['MUNAME', 'muname', 'MapUnitName', 'MAPUNIT', 'SOIL_NAME', 'Name', 'NAME', 'MUSYM', 'musym'];
    return intersectToAcres(fc.features, geom,
      p => nameFields.map(k => p[k]).find(v => v && typeof v === 'string') || null
    );
  }

  async function queryWetlands(geom) {
    const resp = await fetch(`${WETLANDS_QUERY_URL}/query?${arcgisBboxParams(geom, 'WetlandType,NWICode')}`);
    if (!resp.ok) throw new Error(`Wetlands HTTP ${resp.status}`);
    const fc = await resp.json();
    if (!fc.features?.length) return new Map();
    return intersectToAcres(fc.features, geom,
      p => p.WetlandType || p.NWICode || null
    );
  }

  // Roads are centerlines ~10m inside road ROW; buffer 20m to capture adjacent centerlines
  async function queryRoadFrontage(geom) {
    const parcelFeat = { type: 'Feature', geometry: geom, properties: {} };
    const buffer = turf.buffer(parcelFeat, 20, { units: 'meters' });

    const resp = await fetch(`${COUNTY_MS}/5/query?${arcgisBboxParams(geom, 'SURFACE,NAME,PREFIX,TYPE')}`);
    if (!resp.ok) throw new Error(`Roads HTTP ${resp.status}`);
    const fc = await resp.json();
    if (!fc.features?.length) return new Map();

    const byType = new Map();
    for (const f of fc.features) {
      if (!f.geometry) continue;
      try {
        if (!turf.booleanIntersects(f, buffer)) continue;
        const len = turf.length(f, { units: 'meters' });
        const step = 5;
        const steps = Math.max(1, Math.ceil(len / step));
        let segMeters = 0;
        let prevIn = false;
        for (let i = 0; i <= steps; i++) {
          const d = Math.min(i * step, len);
          const pt = turf.along(f, d, { units: 'meters' });
          const inBuf = turf.booleanPointInPolygon(pt, buffer);
          if (i > 0) {
            const segLen = Math.min(step, len - (i - 1) * step);
            if (inBuf || prevIn) segMeters += segLen;
          }
          prevIn = inBuf;
        }
        if (segMeters > 0) {
          const surface = f.properties.SURFACE || 'UNK';
          byType.set(surface, (byType.get(surface) || 0) + segMeters * 3.28084);
        }
      } catch(e) {}
    }
    return byType;
  }

  function renderFrontageSection(data) {
    const section = document.getElementById('hab-frontage-section');
    if (!section) return;
    if (!data.size) {
      section.innerHTML = '<div class="hab-section-head">Road Frontage</div><div class="hab-empty">No road frontage found</div>';
      return;
    }
    const sorted = Array.from(data.entries()).sort((a, b) => b[1] - a[1]);
    let rows = '';
    for (const [code, feet] of sorted) {
      const label = SURFACE_LABELS[code] || code;
      rows += `<div class="hab-row">
        <div class="hab-row-head">
          <span class="hab-row-label">${label}</span>
          <span class="hab-stats">${Math.round(feet).toLocaleString()} ft</span>
        </div>
      </div>`;
    }
    section.innerHTML = '<div class="hab-section-head">Road Frontage</div>' + rows;
  }

  // ── Map legend ───────────────────────────────────────────────────

  function shortVegLabel(t) {
    return t
      .replace(/ FOREST$/i, '').replace(/ SWAMP$/i, ' Swamp')
      .replace(/SHRUB SWAMP\/EMERGENT MARSH/i, 'Shrub-Emergent')
      .replace(/LAKE\/RIVER/i, 'Lake/River')
      .split(' ')
      .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
      .join(' ');
  }

  function updateLegend() {
    const el = document.getElementById('map-legend');
    const parts = [];

    // Public lands — one swatch per category
    if (document.getElementById('chk-public-lands').checked) {
      parts.push('<span class="legend-section">Public Lands</span>');
      Object.values(PL_CFG).forEach(cfg => {
        parts.push(`<span class="legend-item"><span class="legend-swatch" style="background:${cfg.fill};border-color:${cfg.border}"></span>${cfg.label}</span>`);
      });
    }

    // USFS Forest Stands — decade-of-origin legend
    if (document.getElementById('chk-fsveg').checked) {
      parts.push('<span class="legend-section">Forest Stands</span>');
      [['< 1900','#7b2d8b'],['1900–19','#2d6a4f'],['1920–39','#52796f'],['1940–59','#74c69d'],
       ['1960–79','#e9c46a'],['1980–99','#f4a261'],['2000+','#e76f51'],['Unknown','#aaaaaa']
      ].forEach(([label, color]) => {
        parts.push(`<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${label}</span>`);
      });
    }

    // Pre-settlement vegetation — show only cover types visible in current view
    if (document.getElementById('chk-veg').checked && vegLayer) {
      const seen = new Map(); // type → color
      vegLayer.eachFeature(layer => {
        const ct = layer.feature?.properties?.COVERTYPE;
        if (ct && !seen.has(ct)) seen.set(ct, VEG_COLORS[ct] || '#aaaaaa');
      });
      if (seen.size) {
        parts.push('<span class="legend-section">Veg</span>');
        seen.forEach((color, type) => {
          parts.push(`<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${shortVegLabel(type)}</span>`);
        });
      }
    }

    // CDL — static set of most common Newaygo County categories
    if (document.getElementById('chk-cdl').checked) {
      parts.push('<span class="legend-section">CDL</span>');
      CDL_LEGEND.forEach(([, label, color]) => {
        parts.push(`<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${label}</span>`);
      });
    }

    // Wetlands
    if (document.getElementById('chk-wetlands').checked) {
      parts.push('<span class="legend-item"><span class="legend-swatch" style="background:#4a9eb5;border-color:#3a7e95"></span>Wetlands (Part 303)</span>');
    }

    if (parts.length === 0) {
      el.style.display = 'none';
    } else {
      el.style.display = 'flex';
      el.innerHTML = parts.join('');
    }
  }

  // Trigger legend update on any overlay toggle or map move
  document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(cb =>
    cb.addEventListener('change', updateLegend)
  );
  map.on('moveend', updateLegend);

  // ── Annotations (draw) ───────────────────────────────────────────
  const drawnItems = L.featureGroup().addTo(map);
  let annStyle = { color: '#e84040', weight: 2, fillColor: '#e84040', fillOpacity: 0.2 };
  let activeDrawHandler = null;
  let annEditHandler = null;

  function setAnnColor(hex) {
    annStyle.color = hex;
    annStyle.fillColor = hex;
    document.getElementById('ann-color-pick').value = hex;
    document.querySelectorAll('.ann-swatch').forEach(s =>
      s.classList.toggle('active', s.dataset.color === hex));
  }

  document.querySelectorAll('.ann-swatch').forEach(s =>
    s.addEventListener('click', () => setAnnColor(s.dataset.color)));
  document.getElementById('ann-color-pick').addEventListener('input', e => setAnnColor(e.target.value));

  document.getElementById('ann-width').addEventListener('input', e => {
    annStyle.weight = parseInt(e.target.value);
    document.getElementById('ann-width-val').textContent = e.target.value + 'px';
  });
  document.getElementById('ann-fill-op').addEventListener('input', e => {
    annStyle.fillOpacity = parseInt(e.target.value) / 100;
    document.getElementById('ann-fill-op-val').textContent = e.target.value + '%';
  });

  function annSetActive(btnId) {
    document.querySelectorAll('.ann-btn').forEach(b => b.classList.remove('active'));
    if (btnId) document.getElementById(btnId).classList.add('active');
  }

  function stopDraw() {
    if (activeDrawHandler) { try { activeDrawHandler.disable(); } catch(e) {} activeDrawHandler = null; }
    if (annEditHandler) { try { annEditHandler.save(); annEditHandler.disable(); } catch(e) {} annEditHandler = null; }
    annSetActive(null);
  }

  function attachMeasurement(layer, layerType) {
    if (layerType === 'polygon') {
      const sqM = turf.area(layer.toGeoJSON());
      const acres = sqM / 4046.856422;
      const sqFt = sqM * 10.76391;
      const ring = layer.getLatLngs()[0];
      let perimM = 0;
      for (let i = 0; i < ring.length; i++) perimM += ring[i].distanceTo(ring[(i + 1) % ring.length]);
      const perimFt = perimM * 3.28084;

      const shortLabel = acres >= 0.1 ? acres.toFixed(2) + ' ac' : Math.round(sqFt).toLocaleString() + ' ft²';
      layer.bindTooltip(shortLabel, { permanent: true, direction: 'center', className: 'ann-measure-tip' });

      const areaStr = acres.toFixed(2) + ' ac (' + Math.round(sqFt).toLocaleString() + ' ft²)';
      const perimStr = perimFt >= 5280 ? (perimFt / 5280).toFixed(2) + ' mi' : Math.round(perimFt).toLocaleString() + ' ft';
      layer.on('click', ev => {
        ev.originalEvent.stopPropagation();
        layer.bindPopup(
          `<div class="ann-popup">
            <div class="ann-popup-row"><span class="ann-popup-lbl">Area</span><span class="ann-popup-val">${areaStr}</span></div>
            <div class="ann-popup-row"><span class="ann-popup-lbl">Perimeter</span><span class="ann-popup-val">${perimStr}</span></div>
            <button class="ann-popup-del-btn">Delete</button>
          </div>`,
          { className: 'ann-measure-popup', closeButton: true }
        ).openPopup(ev.latlng);
        layer.once('popupopen', () => {
          const btn = layer.getPopup().getElement().querySelector('.ann-popup-del-btn');
          if (btn) btn.addEventListener('click', () => { layer.closePopup(); drawnItems.removeLayer(layer); });
        });
      });

    } else if (layerType === 'polyline') {
      const pts = layer.getLatLngs();
      let lenM = 0;
      for (let i = 0; i < pts.length - 1; i++) lenM += pts[i].distanceTo(pts[i + 1]);
      const lenFt = lenM * 3.28084;
      const lenMi = lenFt / 5280;

      const shortLabel = lenFt < 5280 ? Math.round(lenFt).toLocaleString() + ' ft' : lenMi.toFixed(2) + ' mi';
      layer.bindTooltip(shortLabel, { permanent: true, direction: 'center', className: 'ann-measure-tip' });

      const lenStr = Math.round(lenFt).toLocaleString() + ' ft / ' + lenMi.toFixed(2) + ' mi';
      layer.on('click', ev => {
        ev.originalEvent.stopPropagation();
        layer.bindPopup(
          `<div class="ann-popup">
            <div class="ann-popup-row"><span class="ann-popup-lbl">Length</span><span class="ann-popup-val">${lenStr}</span></div>
            <button class="ann-popup-del-btn">Delete</button>
          </div>`,
          { className: 'ann-measure-popup', closeButton: true }
        ).openPopup(ev.latlng);
        layer.once('popupopen', () => {
          const btn = layer.getPopup().getElement().querySelector('.ann-popup-del-btn');
          if (btn) btn.addEventListener('click', () => { layer.closePopup(); drawnItems.removeLayer(layer); });
        });
      });

    } else {
      layer.on('click', ev => {
        ev.originalEvent.stopPropagation();
        if (confirm('Delete this annotation?')) drawnItems.removeLayer(layer);
      });
    }
  }

  map.on(L.Draw.Event.CREATED, e => {
    const layer = e.layer;
    if (layer.setStyle) layer.setStyle({ ...annStyle });
    drawnItems.addLayer(layer);
    activeDrawHandler = null;
    annSetActive(null);
    attachMeasurement(layer, e.layerType);
  });

  function startDrawTool(btnId, HandlerClass, opts) {
    if (activeDrawHandler) { stopDraw(); return; }
    stopDraw();
    annSetActive(btnId);
    activeDrawHandler = new HandlerClass(map, opts);
    activeDrawHandler.enable();
  }

  document.getElementById('ann-polygon').addEventListener('click', function() {
    startDrawTool('ann-polygon', L.Draw.Polygon,
      { shapeOptions: { ...annStyle }, showArea: false });
  });
  document.getElementById('ann-line').addEventListener('click', function() {
    startDrawTool('ann-line', L.Draw.Polyline,
      { shapeOptions: { ...annStyle, fill: false } });
  });
  document.getElementById('ann-point').addEventListener('click', function() {
    startDrawTool('ann-point', L.Draw.Marker, {});
  });

  // Text label tool
  document.getElementById('ann-text').addEventListener('click', function() {
    if (this.classList.contains('active')) { stopDraw(); map.off('click', placeTextLabel); return; }
    stopDraw();
    annSetActive('ann-text');
    map.once('click', placeTextLabel);
  });

  function placeTextLabel(e) {
    annSetActive(null);
    const text = prompt('Label text:');
    if (!text) return;
    const color = annStyle.color;
    const icon = L.divIcon({
      className: '',
      html: `<span class="ann-text-label" style="color:${color};font-size:${12 + annStyle.weight * 1.5}px">${text}</span>`,
      iconAnchor: [0, 10]
    });
    const marker = L.marker(e.latlng, { icon, draggable: true });
    marker.on('click', ev => {
      ev.originalEvent.stopPropagation();
      if (confirm('Delete "' + text + '"?')) drawnItems.removeLayer(marker);
    });
    drawnItems.addLayer(marker);
  }

  // Edit toggle
  document.getElementById('ann-edit').addEventListener('click', function() {
    if (annEditHandler) { stopDraw(); return; }
    stopDraw();
    annSetActive('ann-edit');
    annEditHandler = new L.EditToolbar.Edit(map, { featureGroup: drawnItems });
    annEditHandler.enable();
  });

  document.getElementById('ann-clear').addEventListener('click', () => {
    if (drawnItems.getLayers().length === 0) return;
    if (confirm('Delete all annotations?')) { stopDraw(); drawnItems.clearLayers(); }
  });

  document.getElementById('ann-toggle').addEventListener('click', () => {
    const body = document.getElementById('ann-body');
    const arrow = document.querySelector('#ann-toggle .species-arrow');
    const open = body.style.display !== 'none';
    body.style.display = open ? 'none' : '';
    arrow.classList.toggle('closed', open);
  });

  // ── GeoPDF export ────────────────────────────────────────────────
  document.getElementById('btn-export-pdf').addEventListener('click', () => {
    const btn = document.getElementById('btn-export-pdf');
    btn.textContent = 'Capturing…';
    btn.disabled = true;

    leafletImage(map, async (err, tilesCanvas) => {
      if (err) {
        console.error('leaflet-image:', err);
        btn.textContent = 'GeoPDF (Avenza)';
        btn.disabled = false;
        return;
      }
      try {
        btn.textContent = 'Building…';
        // Derive W/H from tilesCanvas — keeps PDF page size and geo registration
        // consistent with what leafletImage actually captured, regardless of any
        // layout shift (scrollbar, resize) that may have occurred during the call.
        const W    = tilesCanvas.width;
        const H    = tilesCanvas.height;
        const b    = map.getBounds();
        const z    = map.getZoom();
        const c    = map.getCenter();
        const mapEl = document.getElementById('map');

        // Composite: tile layers (from leafletImage) + SVG vector layers
        // leafletImage captures tiles but silently drops SVG overlays in Leaflet 1.9
        const out  = document.createElement('canvas');
        out.width  = W; out.height = H;
        const draw = out.getContext('2d');
        if (tilesCanvas) draw.drawImage(tilesCanvas, 0, 0);

        // SVG compositing: re-render each SVG layer at the viewport's layer-coord window.
        // Override viewBox to (−mapPanePos, W, H) so the visible container area maps
        // 1:1 to the canvas at (0,0). Clear the inline CSS transform Leaflet sets on
        // the SVG element — it would shift content when the SVG is rendered standalone.
        const mapPaneEl  = mapEl.querySelector('.leaflet-map-pane');
        const mapPanePos = L.DomUtil.getPosition(mapPaneEl) || { x: 0, y: 0 };

        for (const svgEl of mapEl.querySelectorAll('.leaflet-pane svg')) {
          const clone = svgEl.cloneNode(true);
          clone.setAttribute('viewBox', `${-mapPanePos.x} ${-mapPanePos.y} ${W} ${H}`);
          clone.setAttribute('width',  W);
          clone.setAttribute('height', H);
          clone.style.cssText = '';   // remove translate3d set by Leaflet — would shift standalone render
          clone.querySelectorAll('[clip-path]').forEach(el => el.removeAttribute('clip-path'));
          const blobUrl = URL.createObjectURL(
            new Blob([new XMLSerializer().serializeToString(clone)],
                     { type: 'image/svg+xml;charset=utf-8' })
          );
          await new Promise(res => {
            const img = new Image();
            img.onload = () => { draw.drawImage(img, 0, 0, W, H); URL.revokeObjectURL(blobUrl); res(); };
            img.onerror = () => { URL.revokeObjectURL(blobUrl); res(); };
            img.src = blobUrl;
          });
        }

        // Draw open popup using canvas 2D only — no SVG/foreignObject/external
        // resources so the canvas stays untainted regardless of active layers.
        if (map._popup && map._popup._container) {
          const popEl  = map._popup._container;
          const mapBox = mapEl.getBoundingClientRect();
          const popBox = popEl.getBoundingClientRect();
          const pX = Math.round(popBox.left - mapBox.left);
          const pY = Math.round(popBox.top  - mapBox.top);

          const lines = (map._popup.getContent() || '')
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<\/div>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .split('\n')
            .map(l => l.trim())
            .filter(Boolean);

          if (lines.length) {
            const pad = 10, lh = 17, titleH = 20;
            const bW  = Math.min(260, W - pX - 8);
            const bH  = titleH + (lines.length - 1) * lh + pad * 2;

            // Box
            draw.fillStyle = 'rgba(22,26,46,0.96)';
            draw.strokeStyle = '#3a3e5a';
            draw.lineWidth = 1;
            draw.beginPath();
            const r = 6;
            draw.moveTo(pX + r, pY);
            draw.lineTo(pX + bW - r, pY);
            draw.arcTo(pX+bW, pY,    pX+bW, pY+r,    r);
            draw.lineTo(pX+bW, pY+bH-r);
            draw.arcTo(pX+bW, pY+bH, pX+bW-r, pY+bH, r);
            draw.lineTo(pX+r,  pY+bH);
            draw.arcTo(pX,     pY+bH, pX,      pY+bH-r, r);
            draw.lineTo(pX,    pY+r);
            draw.arcTo(pX,     pY,    pX+r,    pY,      r);
            draw.closePath();
            draw.fill();
            draw.stroke();

            // Text
            draw.font = `bold 12px system-ui,sans-serif`;
            draw.fillStyle = '#dde1f0';
            draw.fillText(lines[0], pX + pad, pY + pad + 13, bW - pad * 2);
            draw.font = `11px system-ui,sans-serif`;
            draw.fillStyle = '#8a93b4';
            lines.slice(1).forEach((l, i) => {
              draw.fillText(l, pX + pad, pY + pad + titleH + i * lh + 4, bW - pad * 2);
            });
          }
        }

        const imgBytes = await new Promise((res, rej) =>
          out.toBlob(blob => blob ? blob.arrayBuffer().then(res) : rej('tainted canvas'), 'image/png')
        );

        const { PDFDocument, PDFName, PDFString, StandardFonts, rgb } = PDFLib;
        const pdfDoc = await PDFDocument.create();
        const page   = pdfDoc.addPage([W, H]);
        const png    = await pdfDoc.embedPng(imgBytes);
        page.drawImage(png, { x: 0, y: 0, width: W, height: H });

        // Branding strip drawn in PDF layer (not on canvas) so registration stays accurate
        const brandFont = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const brandH = 20;
        page.drawRectangle({ x: 0, y: 0, width: W, height: brandH, color: rgb(0.047, 0.059, 0.102), opacity: 0.84 });
        const brandText = 'Newaygo County Field Map  •  Leaflet.js + esri-leaflet  •  github.com/karl-dykema/fieldMap';
        const brandSize = 9;
        const brandTw = brandFont.widthOfTextAtSize(brandText, brandSize);
        page.drawText(brandText, { x: Math.max(4, (W - brandTw) / 2), y: 6, size: brandSize, font: brandFont, color: rgb(0.33, 0.38, 0.50), maxWidth: W - 8 });

        // Legend bar in PDF (above branding, mirrors the on-screen legend)
        const legendEl = document.getElementById('map-legend');
        if (legendEl.style.display !== 'none') {
          const legItems = [];
          for (const child of legendEl.children) {
            if (child.classList.contains('legend-section')) {
              legItems.push({ type: 'section', text: child.textContent.trim() });
            } else if (child.classList.contains('legend-item')) {
              const swEl = child.querySelector('.legend-swatch');
              legItems.push({ type: 'item', color: swEl ? swEl.style.background : '#888', text: child.textContent.trim() });
            }
          }
          if (legItems.length) {
            const legH = 26;
            const legY = brandH;
            page.drawRectangle({ x: 0, y: legY, width: W, height: legH, color: rgb(0.047, 0.059, 0.102), opacity: 0.88 });
            let lx = 10;
            const ly = legY + (legH - 9) / 2;
            for (const item of legItems) {
              if (lx > W - 80) break;
              if (item.type === 'section') {
                const txt = item.text.toUpperCase();
                page.drawText(txt, { x: lx, y: ly, size: 8, font: brandFont, color: rgb(0.29, 0.31, 0.44) });
                lx += brandFont.widthOfTextAtSize(txt, 8) + 8;
              } else {
                const css = item.color;
                let swR = 0.5, swG = 0.5, swB = 0.5;
                const nums = css.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                if (nums) { swR = parseInt(nums[1])/255; swG = parseInt(nums[2])/255; swB = parseInt(nums[3])/255; }
                else if (css.startsWith('#') && css.length >= 7) {
                  swR = parseInt(css.slice(1,3),16)/255;
                  swG = parseInt(css.slice(3,5),16)/255;
                  swB = parseInt(css.slice(5,7),16)/255;
                }
                page.drawRectangle({ x: lx, y: ly, width: 11, height: 11, color: rgb(swR, swG, swB) });
                lx += 15;
                page.drawText(item.text, { x: lx, y: ly, size: 9, font: brandFont, color: rgb(0.54, 0.58, 0.71) });
                lx += brandFont.widthOfTextAtSize(item.text, 9) + 12;
              }
            }
          }
        }

        // OGC LGIDict — PDF origin is bottom-left; (0,H) = top of page = north
        const pdfCtx = pdfDoc.context;
        const lgi = pdfCtx.obj({
          Type:         PDFName.of('LGIDict'),
          Version:      PDFString.of('2.21'),
          Description:  PDFString.of('Newaygo County Field Map'),
          Neatline:     pdfCtx.obj([0, 0, W, 0, W, H, 0, H]),
          Registration: pdfCtx.obj([
            [0, 0, b.getWest(),  b.getSouth()],
            [W, 0, b.getEast(),  b.getSouth()],
            [W, H, b.getEast(),  b.getNorth()],
            [0, H, b.getWest(),  b.getNorth()],
          ]),
          Projection: pdfCtx.obj({
            Type:           PDFName.of('Projection'),
            ProjectionType: PDFString.of('GEOGRAPHIC'),
            Datum:          PDFString.of('WGS84'),
            Units:          PDFString.of('DEGREES'),
          }),
        });
        page.node.set(PDFName.of('LGIDict'), lgi);

        const bytes = await pdfDoc.save();
        const url   = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
        const a     = document.createElement('a');
        a.href     = url;
        a.download = `newaygo_${c.lat.toFixed(4)}_${c.lng.toFixed(4)}_z${z}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error('GeoPDF export failed:', e);
        alert('Export failed — some tile layers may block canvas capture due to CORS. Try with just OSM or ESRI base layer active.');
      }
      btn.textContent = 'GeoPDF (Avenza)';
      btn.disabled = false;
    });
  });

</script>

<script data-goatcounter="https://fieldmap.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
